version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: entelaka-mysql
    restart: always
    #environment:
      #MYSQL_ROOT_PASSWORD: 
      #MYSQL_DATABASE: 
      #MYSQL_USER: 
      #MYSQL_PASSWORD:  
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  spring-app:
    build:
      context: .
      dockerfile: Dockerfile.spring
    container_name: entelaka-spring
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    #environment:
      #SPRING_DATASOURCE_URL:  
      #SPRING_DATASOURCE_USERNAME: 
      #SPRING_DATASOURCE_PASSWORD: 

  node-chat:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: entelaka-nodechat
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    #environment:
      #DB_HOST: 
      #DB_USER: 
      #DB_PASSWORD: 
      #DB_NAME: 
